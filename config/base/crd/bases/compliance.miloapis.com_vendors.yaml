---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: vendors.compliance.miloapis.com
spec:
  group: compliance.miloapis.com
  names:
    categories:
    - compliance
    kind: Vendor
    listKind: VendorList
    plural: vendors
    singular: vendor
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: Display Name
      type: string
    - jsonPath: .spec.legalEntity
      name: Legal Entity
      type: string
    - jsonPath: .spec.countryOfIncorporation
      name: Country
      type: string
    - jsonPath: .spec.complianceProfile.phase
      name: Profile Phase
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Vendor is a staff-managed record representing a third-party vendor in Datum
          Cloud's platform supply chain. Vendors that process personal data carry a
          compliance profile, which the compliance controller uses to derive a
          publicly-disclosed Subprocessor resource.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: VendorSpec defines the desired state of a Vendor.
            properties:
              complianceProfile:
                description: |-
                  ComplianceProfile is the optional regulatory overlay for this vendor.
                  Its presence indicates the vendor processes personal data on behalf of
                  Datum Cloud and triggers generation of a Subprocessor resource when the
                  profile phase is Active.
                properties:
                  dataCategories:
                    description: |-
                      DataCategories enumerates the categories of personal data processed by
                      this vendor. At least one category is required.
                    items:
                      description: |-
                        DataCategory is an enumerated taxonomy of personal data categories processed
                        by a vendor. This taxonomy is load-bearing: retention, residency, and ROPA
                        capabilities key off these values, so additions are preferred over renames.
                      enum:
                      - identity
                      - authentication
                      - telemetry
                      - billing
                      - user-content
                      - access-logs
                      - audit-trail
                      type: string
                    minItems: 1
                    type: array
                  dataSubjectTypes:
                    description: |-
                      DataSubjectTypes identifies the categories of individuals whose data is
                      processed.
                    items:
                      description: DataSubjectType identifies the category of individuals
                        whose data is processed.
                      enum:
                      - organization-admin
                      - consumer
                      - platform-staff
                      type: string
                    type: array
                  dpaReference:
                    description: |-
                      DPAReference is an opaque reference (e.g., URL or document identifier)
                      to the Data Processing Agreement with this vendor. A compliance profile
                      without a DPA reference is incomplete.
                    maxLength: 2048
                    type: string
                  effectiveDate:
                    description: |-
                      EffectiveDate is when this compliance profile became or will become
                      effective.
                    format: date-time
                    type: string
                  phase:
                    default: Draft
                    description: |-
                      Phase is the current lifecycle state of this compliance profile.
                      Transitioning to Active causes the controller to generate a Subprocessor.
                    enum:
                    - Draft
                    - Active
                    type: string
                  processingRegions:
                    description: |-
                      ProcessingRegions lists the countries or regions where the vendor
                      processes data, using ISO 3166-1 alpha-2 country codes or named regions
                      (e.g., "US", "EU").
                    items:
                      type: string
                    type: array
                  purpose:
                    description: |-
                      Purpose describes what the vendor does with personal data and why it is
                      necessary for platform operation.
                    maxLength: 1000
                    type: string
                  riskTier:
                    description: RiskTier is a staff-assigned risk classification
                      for this vendor.
                    enum:
                    - Low
                    - Medium
                    - High
                    - Critical
                    type: string
                  transferMechanism:
                    description: |-
                      TransferMechanism is the legal basis for transferring personal data to
                      this vendor where an international transfer occurs.
                    enum:
                    - SCCs
                    - AdequacyDecision
                    - BCRs
                    type: string
                required:
                - dataCategories
                - phase
                - purpose
                - riskTier
                - transferMechanism
                type: object
              countryOfIncorporation:
                description: |-
                  CountryOfIncorporation is the ISO 3166-1 alpha-2 country code of the
                  jurisdiction where the vendor's legal entity is incorporated.
                maxLength: 2
                minLength: 2
                pattern: ^[A-Z]{2}$
                type: string
              displayName:
                description: |-
                  DisplayName is the human-readable name of the vendor as it will appear
                  in public disclosures (e.g., "Amazon Web Services").
                maxLength: 256
                type: string
              legalEntity:
                description: |-
                  LegalEntity is the registered legal name of the vendor entity that is
                  party to the DPA.
                maxLength: 512
                type: string
              website:
                description: Website is the vendor's primary public website.
                maxLength: 2048
                type: string
            required:
            - countryOfIncorporation
            - displayName
            - legalEntity
            type: object
          status:
            description: VendorStatus defines the observed state of a Vendor.
            properties:
              conditions:
                default:
                - lastTransitionTime: "1970-01-01T00:00:00Z"
                  message: Waiting for control plane to reconcile
                  reason: Unknown
                  status: Unknown
                  type: Ready
                description: |-
                  Conditions represents the observations of a Vendor's current state.
                  Known condition types: "Ready", "SubprocessorSynced".
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: |-
                  ObservedGeneration is the most recent generation observed for this Vendor
                  by the controller.
                format: int64
                type: integer
              subprocessorRef:
                description: |-
                  SubprocessorRef holds the name of the derived Subprocessor resource when
                  the vendor's compliance profile is Active. Empty when no Subprocessor
                  has been generated.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
